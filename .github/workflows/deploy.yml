name: KigaliEats CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # JOB 1 - Test & Build Backend
  test-server:
    name: Test & Build Server
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        run: |
          cd server
          npm install

      - name: Verify server starts
        run: |
          cd server
          node --input-type=module <<'EOF'
          import express from 'express';
          const app = express();
          console.log('✅ Server build verified');
          EOF

  # JOB 2 - Build Frontend
  build-client:
    name: Build Client
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        run: |
          cd client
          npm install

      - name: Build client
        run: |
          cd client
          npm run build
        env:
          VITE_API_URL: /api

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-build
          path: client/dist

  # JOB 3 - Docker Build
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [test-server, build-client]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build server Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: false
          tags: kigalieats-server:latest

      - name: Build client Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: false
          tags: kigalieats-client:latest

  # JOB 4 - Deploy to Render
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy Backend to Render
        run: |
          curl -X POST "${{ secrets.RENDER_BACKEND_DEPLOY_URL }}"

      - name: Deploy Frontend to Render
        run: |
          curl -X POST "${{ secrets.RENDER_FRONTEND_DEPLOY_URL }}"

      - name: Deployment Complete
        run: |
          echo "✅ KigaliEats deployed successfully!"
          echo "🍔 Backend and Frontend are live on Render"