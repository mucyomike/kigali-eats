name: KigaliEats CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # JOB 1 - Test & Build Backend
  test-server:
    name: Test & Build Server
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        run: |
          cd server
          npm install

      - name: Verify server build
        run: |
          cd server
          node --input-type=module <<'EOF'
          import express from 'express';
          const app = express();
          console.log('✅ Server build verified');
          EOF

  # JOB 2 - Build Frontend
  build-client:
    name: Build Client
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        run: |
          cd client
          npm install

      - name: Build client
        run: |
          cd client
          npm run build
        env:
          VITE_API_URL: /api

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-build
          path: client/dist

  # JOB 3 - Deploy to Render
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [test-server, build-client]
    if: github.ref == 'refs/heads/main' && secrets.RENDER_BACKEND_DEPLOY_URL != ''
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy Backend to Render
        if: secrets.RENDER_BACKEND_DEPLOY_URL != ''
        run: |
          curl -X POST "${{ secrets.RENDER_BACKEND_DEPLOY_URL }}"
          echo "✅ Backend deploy triggered"

      - name: Deploy Frontend to Render
        if: secrets.RENDER_FRONTEND_DEPLOY_URL != ''
        run: |
          curl -X POST "${{ secrets.RENDER_FRONTEND_DEPLOY_URL }}"
          echo "✅ Frontend deploy triggered"

      - name: Deployment Complete
        run: echo "✅ KigaliEats CI/CD pipeline completed!"